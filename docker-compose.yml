services:
  n8n:
    image: n8nio/n8n:latest
    container_name: job-hunter-n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=Asia/Kolkata

    volumes:
      - ./n8n:/home/node/.n8n
